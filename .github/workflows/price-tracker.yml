name: Bookswagon Price Tracker

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC | 8:00 PM IST = 2:30 PM UTC
    - cron: '30 2,14 * * *'
  workflow_dispatch: # allows manual trigger from Actions tab

jobs:
  track-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for keepalive commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python tracker.py

      - name: Keepalive Workflow
        run: |
          # Prevents GitHub from auto-disabling scheduled workflows
          # after 60 days of repo inactivity (replaces keepalive-workflow action)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: keepalive commit [skip ci]"
          git push
